<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성의교정 대관 현황</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        :root { --primary-color: #1E3A5F; --accent-color: #e74c3c; --bg-gray: #f8f9fa; }
        body { font-family: 'Pretendard', sans-serif; margin: 0; padding: 20px; background-color: #eee; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        h1 { text-align: center; color: var(--primary-color); font-size: 24px; margin-bottom: 20px; }
        
        /* 설정 영역 */
        .settings-panel { border: 1px solid #ddd; border-radius: 8px; padding: 15px; margin-bottom: 20px; background: #fff; }
        .grid-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #555; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        .btn-download { width: 100%; background: #27ae60; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 15px; }
        .btn-download:hover { background: #219150; }

        /* 결과 출력 영역 */
        .date-bar { background: #343a40; color: white; padding: 10px; border-radius: 6px; text-align: center; font-weight: bold; margin: 25px 0 10px 0; font-size: 15px; }
        .bu-header { font-size: 17px; font-weight: bold; color: var(--primary-color); margin: 15px 0 8px 0; border-left: 5px solid var(--primary-color); padding: 5px 10px; background: #f1f4f9; }
        
        .card { border: 1px solid #eef0f2; border-radius: 6px; padding: 12px; margin-bottom: 8px; background: #fff; }
        .card-row-1 { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .loc-text { font-weight: 800; color: var(--primary-color); font-size: 14px; }
        .time-text { color: var(--accent-color); font-weight: 700; font-size: 13px; }
        .status-badge { padding: 2px 6px; border-radius: 4px; font-size: 11px; color: white; background: #2ecc71; font-weight: bold; }
        .card-row-2 { font-size: 12px; color: #555; border-top: 1px solid #f8f9fa; padding-top: 5px; }

        .loading { text-align: center; padding: 40px; color: #888; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏫 성의교정 대관 현황</h1>

    <div class="settings-panel">
        <div class="grid-row">
            <div>
                <label>조회 날짜</label>
                <input type="date" id="targetDate">
            </div>
            <div>
                <label>건물 선택</label>
                <select id="buildingSelect">
                    <option value="전체">전체 보기</option>
                    <option value="성의회관">성의회관</option>
                    <option value="의생명산업연구원">의생명산업연구원</option>
                    <option value="옴니버스 파크">옴니버스 파크</option>
                </select>
            </div>
        </div>
        <button class="btn-download" onclick="downloadExcel()">📥 엑셀로 저장 (편집완료 상태)</button>
    </div>

    <div id="loading" class="loading">데이터를 불러오는 중입니다...</div>
    <div id="resultArea"></div>
</div>

<script>
    const BUILDING_ORDER = ["성의회관", "의생명산업연구원", "옴니버스 파크", "옴니버스파크 의과대학", "옴니버스파크 간호대학", "대학본관", "서울성모별관"];
    let fetchedData = [];

    // 초기 날짜 설정 (오늘)
    document.getElementById('targetDate').valueAsDate = new Date();

    // 조(Shift) 계산 함수
    function getShift(dateStr) {
        const base = new Date('2026-03-13');
        const target = new Date(dateStr);
        const diff = Math.floor((target - base) / (1000 * 60 * 60 * 24));
        const shifts = ['A', 'B', 'C'];
        let idx = diff % 3;
        if (idx < 0) idx += 3;
        return shifts[idx] + "조";
    }

    // 데이터 가져오기 (API 호출)
    async function fetchData() {
        const date = document.getElementById('targetDate').value;
        if (!date) return;

        document.getElementById('loading').style.display = 'block';
        document.getElementById('resultArea').innerHTML = '';

        const url = `https://songeui.catholic.ac.kr/ko/service/application-for-rental_calendar.do?mode=getReservedData&start=${date}&end=${date}`;
        
        try {
            const response = await fetch(url);
            const json = await response.json();
            fetchedData = json.res || [];
            renderData(date);
        } catch (error) {
            alert("데이터를 가져오는 중 오류가 발생했습니다.");
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    }

    function renderData(date) {
        const resultArea = document.getElementById('resultArea');
        const selBu = document.getElementById('buildingSelect').value;
        const shift = getShift(date);

        let html = `<div class="date-bar">📅 ${date} | ${shift}</div>`;

        BUILDING_ORDER.forEach(bu => {
            if (selBu !== "전체" && selBu !== bu) return;

            const filtered = fetchedData.filter(item => (item.buNm || '').trim() === bu);
            html += `<div class="bu-header">🏢 ${bu} (${filtered.length}건)</div>`;

            if (filtered.length > 0) {
                filtered.forEach(item => {
                    html += `
                        <div class="card">
                            <div class="card-row-1">
                                <span class="loc-text">📍 ${item.placeNm || '-'}</span>
                                <span class="time-text">🕒 ${item.startTime}~${item.endTime}</span>
                                <span class="status-badge">${item.status === 'Y' ? '확정' : '대기'}</span>
                            </div>
                            <div class="card-row-2">🏷️ <b>${item.eventNm || '-'}</b> / ${item.mgDeptNm || '-'} (${item.peopleCount}명)</div>
                        </div>`;
                });
            } else {
                html += `<div style="text-align:center; padding:10px; font-size:12px; color:#999;">내역 없음</div>`;
            }
        });
        resultArea.innerHTML = html;
    }

    // 엑셀 다운로드 (가장 중요한 편집 기능)
    async function downloadExcel() {
        if (fetchedData.length === 0) { alert("저장할 데이터가 없습니다."); return; }

        const workbook = new ExcelJS.Workbook();
        const worksheet = workbook.addWorksheet('대관현황');
        const date = document.getElementById('targetDate').value;

        // 1. 제목 행
        worksheet.mergeCells('A1:F1');
        const titleRow = worksheet.getRow(1);
        titleRow.getCell(1).value = "성의교정 대관 현황";
        titleRow.getCell(1).font = { size: 16, bold: true };
        titleRow.getCell(1).alignment = { vertical: 'middle', horizontal: 'center' };
        titleRow.height = 30;

        // 2. 날짜/조 행
        worksheet.mergeCells('A2:F2');
        const dateRow = worksheet.getRow(2);
        dateRow.getCell(1).value = `📅 ${date} | ${getShift(date)}`;
        dateRow.getCell(1).fill = { type: 'pattern', pattern:'solid', fgColor:{argbi:'FF343A40'} };
        dateRow.getCell(1).font = { color: { argb: 'FFFFFFFF' }, bold: true };
        dateRow.getCell(1).alignment = { horizontal: 'center' };

        let currentRow = 4;

        BUILDING_ORDER.forEach(bu => {
            const filtered = fetchedData.filter(item => (item.buNm || '').trim() === bu);
            
            // 건물명 헤더
            worksheet.mergeCells(`A${currentRow}:F${currentRow}`);
            const buRow = worksheet.getRow(currentRow);
            buRow.getCell(1).value = `🏢 ${bu} (${filtered.length}건)`;
            buRow.getCell(1).fill = { type: 'pattern', pattern:'solid', fgColor:{argb:'FFD9E1F2'} };
            buRow.getCell(1).font = { color: { argb: 'FF1E3A5F' }, bold: true };
            currentRow++;

            // 표 헤더
            const headRow = worksheet.getRow(currentRow);
            const headers = ['장소', '시간', '행사명', '부서', '인원', '상태'];
            headers.forEach((h, i) => {
                const cell = headRow.getCell(i + 1);
                cell.value = h;
                cell.fill = { type: 'pattern', pattern:'solid', fgColor:{argb:'FFF2F2F2'} };
                cell.border = { top: {style:'thin'}, left: {style:'thin'}, bottom: {style:'thin'}, right: {style:'thin'} };
                cell.alignment = { horizontal: 'center' };
            });
            currentRow++;

            // 데이터 입력
            if(filtered.length === 0) {
                worksheet.mergeCells(`A${currentRow}:F${currentRow}`);
                worksheet.getRow(currentRow).getCell(1).value = "데이터 없음";
                worksheet.getRow(currentRow).getCell(1).alignment = { horizontal: 'center' };
                currentRow += 2;
            } else {
                filtered.forEach(item => {
                    const row = worksheet.getRow(currentRow);
                    const data = [item.placeNm, `${item.startTime}~${item.endTime}`, item.eventNm, item.mgDeptNm, item.peopleCount, item.status==='Y'?'확정':'대기'];
                    data.forEach((d, i) => {
                        const cell = row.getCell(i + 1);
                        cell.value = d;
                        cell.border = { top: {style:'thin'}, left: {style:'thin'}, bottom: {style:'thin'}, right: {style:'thin'} };
                        cell.alignment = { vertical: 'middle', wrapText: true };
                    });
                    row.height = 35;
                    currentRow++;
                });
                currentRow += 1;
            }
        });

        // 열 너비 설정
        worksheet.getColumn(1).width = 25;
        worksheet.getColumn(2).width = 15;
        worksheet.getColumn(3).width = 40;
        worksheet.getColumn(4).width = 20;

        const buffer = await workbook.xlsx.writeBuffer();
        saveAs(new Blob([buffer]), `성의교정_대관현황_${date}.xlsx`);
    }

    // 날짜 변경 시 자동 데이터 로드
    document.getElementById('targetDate').addEventListener('change', fetchData);
    document.getElementById('buildingSelect').addEventListener('change', () => renderData(document.getElementById('targetDate').value));
    
    // 페이지 로드 시 첫 실행
    window.onload = fetchData;
</script>

</body>
</html>

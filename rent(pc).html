
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성의교정 대관 현황 관리</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        :root { --primary: #1E3A5F; --accent: #e74c3c; --bg: #f4f7f9; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        h1 { text-align: center; color: var(--primary); font-size: 26px; margin-bottom: 25px; letter-spacing: -1px; }
        
        /* 설정 패널 */
        .config-card { background: #fff; border: 1px solid #e1e4e8; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .row { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        .col { flex: 1; min-width: 200px; }
        label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; color: #666; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; }
        input:focus { border-color: var(--primary); }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .btn-fetch { background: var(--primary); color: white; }
        .btn-fetch:hover { background: #132a46; }
        .btn-excel { background: #27ae60; color: white; }
        .btn-excel:hover { background: #1e8449; }

        /* 출력 스타일 */
        .date-section { margin-top: 30px; }
        .date-header { background: #343a40; color: white; padding: 12px; border-radius: 8px; text-align: center; font-weight: bold; font-size: 16px; margin-bottom: 15px; }
        .bu-group { margin-bottom: 20px; }
        .bu-title { font-size: 16px; font-weight: bold; color: var(--primary); padding: 8px 12px; background: #ebf0f6; border-left: 5px solid var(--primary); margin-bottom: 10px; border-radius: 0 4px 4px 0; }
        
        .item-card { background: white; border: 1px solid #eee; border-radius: 8px; padding: 12px; margin-bottom: 8px; transition: transform 0.1s; }
        .item-card:hover { transform: translateY(-2px); border-color: #ddd; }
        .item-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .place { font-weight: 800; color: var(--primary); }
        .time { color: var(--accent); font-weight: 700; font-size: 13px; }
        .status { font-size: 11px; padding: 2px 6px; border-radius: 4px; background: #2ecc71; color: white; font-weight: bold; }
        .item-bottom { font-size: 12px; color: #666; border-top: 1px solid #f9f9f9; padding-top: 6px; line-height: 1.5; }

        .loading-overlay { display: none; text-align: center; padding: 30px; color: var(--primary); font-weight: bold; }
        .no-data { text-align: center; padding: 20px; color: #999; font-size: 13px; border: 1px dashed #ccc; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏫 성의교정 대관 현황 조회</h1>

    <div class="config-card">
        <div class="row">
            <div class="col">
                <label>시작 날짜</label>
                <input type="date" id="startDate">
            </div>
            <div class="col">
                <label>종료 날짜</label>
                <input type="date" id="endDate">
            </div>
        </div>
        <div class="row">
            <div class="col">
                <label>건물 선택 (다중 선택 가능)</label>
                <select id="buFilter" multiple style="height: 100px;">
                    <option value="전체" selected>전체 건물 보기</option>
                    <option value="성의회관">성의회관</option>
                    <option value="의생명산업연구원">의생명산업연구원</option>
                    <option value="옴니버스 파크">옴니버스 파크</option>
                    <option value="옴니버스파크 의과대학">옴니버스파크 의과대학</option>
                    <option value="옴니버스파크 간호대학">옴니버스파크 간호대학</option>
                    <option value="대학본관">대학본관</option>
                    <option value="서울성모별관">서울성모별관</option>
                </select>
                <small style="color:#888; font-size:11px;">* Ctrl 키를 누르고 클릭하면 중복 선택 가능</small>
            </div>
        </div>
        <div class="btn-group">
            <button class="btn-fetch" onclick="fetchAndRender()">🔄 데이터 불러오기</button>
            <button class="btn-excel" onclick="downloadExcel()">📥 엑셀 저장 (편집완료)</button>
        </div>
    </div>

    <div id="loading" class="loading-overlay">⏳ 서버에서 데이터를 가져오고 있습니다...</div>
    <div id="displayArea"></div>
</div>

<script>
    const BUILDINGS = ["성의회관", "의생명산업연구원", "옴니버스 파크", "옴니버스파크 의과대학", "옴니버스파크 간호대학", "대학본관", "서울성모별관"];
    const WEEKDAYS = ["일", "월", "화", "수", "목", "금", "토"];
    let globalData = [];

    // 날짜 초기값 세팅
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('startDate').value = today;
    document.getElementById('endDate').value = today;

    function getShift(dateStr) {
        const base = new Date('2026-03-13'); // C조 시작 기준일
        const target = new Date(dateStr);
        const diff = Math.floor((target - base) / (86400000));
        const shifts = ['A', 'B', 'C'];
        let idx = diff % 3;
        if (idx < 0) idx += 3;
        return shifts[idx] + "조";
    }

    async function fetchAndRender() {
        const start = document.getElementById('startDate').value;
        const end = document.getElementById('endDate').value;
        const loading = document.getElementById('loading');
        const area = document.getElementById('displayArea');

        if (!start || !end) { alert("날짜를 선택해주세요."); return; }

        loading.style.display = 'block';
        area.innerHTML = '';

        // CORS 해결을 위해 AllOrigins 프록시 사용
        const targetUrl = `https://songeui.catholic.ac.kr/ko/service/application-for-rental_calendar.do?mode=getReservedData&start=${start}&end=${end}`;
        const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;

        try {
            const resp = await fetch(proxyUrl);
            const json = await resp.json();
            const result = JSON.parse(json.contents);
            globalData = result.res || [];
            
            renderUI(start, end);
        } catch (e) {
            console.error(e);
            alert("데이터를 불러오지 못했습니다. 잠시 후 다시 시도해주세요.");
        } finally {
            loading.style.display = 'none';
        }
    }

    function renderUI(start, end) {
        const area = document.getElementById('displayArea');
        const selectedOptions = Array.from(document.getElementById('buFilter').selectedOptions).map(o => o.value);
        let html = '';

        let curr = new Date(start);
        const last = new Date(end);

        while (curr <= last) {
            const dStr = curr.toISOString().split('T')[0];
            const dayOfWeek = WEEKDAYS[curr.getDay()];
            
            html += `<div class="date-section">
                        <div class="date-header">📅 ${dStr} (${dayOfWeek}요일) | ${getShift(dStr)}</div>`;

            BUILDINGS.forEach(bu => {
                if (!selectedOptions.includes("전체") && !selectedOptions.includes(bu)) return;

                // API 데이터 중 해당 날짜와 건물 매칭 (공백 제거 후 비교)
                const filtered = globalData.filter(d => 
                    d.startDt === dStr && (d.buNm || '').replace(/\s/g,'') === bu.replace(/\s/g,'')
                );

                html += `<div class="bu-group">
                            <div class="bu-title">🏢 ${bu} (${filtered.length}건)</div>`;
                
                if (filtered.length > 0) {
                    filtered.forEach(item => {
                        html += `
                            <div class="item-card">
                                <div class="item-top">
                                    <span class="place">📍 ${item.placeNm}</span>
                                    <span class="time">🕒 ${item.startTime} ~ ${item.endTime}</span>
                                    <span class="status">${item.status === 'Y' ? '확정' : '대기'}</span>
                                </div>
                                <div class="item-bottom">
                                    <b>행사:</b> ${item.eventNm}<br>
                                    <b>부서:</b> ${item.mgDeptNm} (${item.peopleCount}명)
                                </div>
                            </div>`;
                    });
                } else {
                    html += `<div class="no-data">대관 내역이 없습니다.</div>`;
                }
                html += `</div>`;
            });
            html += `</div>`;
            curr.setDate(curr.getDate() + 1);
        }
        area.innerHTML = html;
    }

    async function downloadExcel() {
        if (globalData.length === 0) { alert("데이터를 먼저 불러와주세요."); return; }

        const workbook = new ExcelJS.Workbook();
        const sheet = workbook.addWorksheet('대관현황');
        
        // 엑셀 기본 열 너비
        sheet.columns = [
            { width: 20 }, { width: 15 }, { width: 35 }, { width: 20 }, { width: 10 }, { width: 10 }
        ];

        let rowIdx = 1;

        const start = document.getElementById('startDate').value;
        const end = document.getElementById('endDate').value;
        let curr = new Date(start);
        const last = new Date(end);

        while (curr <= last) {
            const dStr = curr.toISOString().split('T')[0];
            
            // 날짜 헤더 (진한 회색 배경)
            const dateRow = sheet.getRow(rowIdx);
            sheet.mergeCells(rowIdx, 1, rowIdx, 6);
            dateRow.getCell(1).value = `📅 ${dStr} (${WEEKDAYS[curr.getDay()]}요일) | ${getShift(dStr)}`;
            dateRow.getCell(1).fill = { type: 'pattern', pattern:'solid', fgColor:{argb:'FF343A40'} };
            dateRow.getCell(1).font = { color: {argb:'FFFFFFFF'}, bold: true };
            dateRow.getCell(1).alignment = { horizontal: 'center' };
            rowIdx++;

            BUILDINGS.forEach(bu => {
                const filtered = globalData.filter(d => 
                    d.startDt === dStr && (d.buNm || '').replace(/\s/g,'') === bu.replace(/\s/g,'')
                );

                // 건물명 (연한 파란색 배경)
                sheet.mergeCells(rowIdx, 1, rowIdx, 6);
                const buRow = sheet.getRow(rowIdx);
                buRow.getCell(1).value = `🏢 ${bu} (${filtered.length}건)`;
                buRow.getCell(1).fill = { type: 'pattern', pattern:'solid', fgColor:{argb:'FFD9E1F2'} };
                buRow.getCell(1).font = { color: {argb:'FF1E3A5F'}, bold: true };
                rowIdx++;

                // 테이블 헤더
                const headRow = sheet.getRow(rowIdx);
                ['장소', '시간', '행사명', '부서', '인원', '상태'].forEach((t, i) => {
                    const c = headRow.getCell(i+1);
                    c.value = t;
                    c.fill = { type: 'pattern', pattern:'solid', fgColor:{argb:'FFF2F2F2'} };
                    c.border = { top:{style:'thin'}, left:{style:'thin'}, bottom:{style:'thin'}, right:{style:'thin'} };
                    c.alignment = { horizontal: 'center' };
                });
                rowIdx++;

                // 데이터
                if (filtered.length === 0) {
                    sheet.mergeCells(rowIdx, 1, rowIdx, 6);
                    sheet.getRow(rowIdx).getCell(1).value = "내역 없음";
                    sheet.getRow(rowIdx).getCell(1).alignment = { horizontal: 'center' };
                    rowIdx++;
                } else {
                    filtered.forEach(item => {
                        const r = sheet.getRow(rowIdx);
                        const vals = [item.placeNm, `${item.startTime}~${item.endTime}`, item.eventNm, item.mgDeptNm, item.peopleCount, item.status==='Y'?'확정':'대기'];
                        vals.forEach((v, i) => {
                            const c = r.getCell(i+1);
                            c.value = v;
                            c.border = { top:{style:'thin'}, left:{style:'thin'}, bottom:{style:'thin'}, right:{style:'thin'} };
                            c.alignment = { vertical: 'middle', wrapText: true };
                        });
                        r.height = 30;
                        rowIdx++;
                    });
                }
                rowIdx++; // 건물 간 간격
            });
            rowIdx++; // 날짜 간 간격
            curr.setDate(curr.getDate() + 1);
        }

        const buffer = await workbook.xlsx.writeBuffer();
        saveAs(new Blob([buffer]), `성의교정_대관현황_${start}_to_${end}.xlsx`);
    }
</script>

</body>
</html>

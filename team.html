<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>C조 통합 근무 시스템 v5.9</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; margin: 0; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-tab.active { color: #2E4077; border-bottom: 3px solid #2E4077; background-color: white; }
        
        .custom-table { width: 100%; border-collapse: collapse; font-size: 11px; text-align: center; table-layout: fixed; background: white; }
        .custom-table th { background: #f8fafc; color: #1e293b; padding: 4px 1px; border: 1px solid #e2e8f0; font-weight: 800; line-height: 1.2; }
        .custom-table td { border: 1px solid #e2e8f0; padding: 5px 1px; color: #475569; }
        .time-cell { width: 82px !important; background-color: #f1f5f9; font-weight: 700; color: #1e293b; }

        .status-card-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 12px; }
        .worker-card { background: white; padding: 10px 5px; border-radius: 14px; border: 1px solid #e2e8f0; text-align: center; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .worker-name { font-size: 10px; font-weight: 800; color: #64748b; margin-bottom: 2px; }
        .worker-pos { font-size: 14px; font-weight: 900; color: #1e293b; }

        .big-msg-box { 
            background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
            color: #1e40af; padding: 22px 15px; border-radius: 20px; 
            text-align: center; font-weight: 900; margin-bottom: 16px; border: 1px solid #bfdbfe;
            font-size: 19px; line-height: 1.6; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); border-top: 1px solid #e2e8f0; border-left: 1px solid #e2e8f0; background: white; }
        .calendar-cell { border-right: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; display: flex; flex-direction: column; aspect-ratio: 1 / 1.3; min-height: 62px; }
        .date-area { flex: 1; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.8rem; }
        .shift-area { flex: 1.2; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1rem; }
        .sunday { color: #ef4444 !important; }
        .saturday { color: #3b82f6 !important; }
        .is-today { outline: 3px solid #ef4444; outline-offset: -3px; z-index: 10; }
        
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.active { display: flex; }
        .admin-input { width: 100%; background: #f8fafc; border: 1px solid #e2e8f0; padding: 12px; border-radius: 12px; font-weight: 700; outline: none; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="main-wrapper" class="max-w-md mx-auto bg-white min-h-screen shadow-lg flex flex-col relative transition-all duration-500">
        <div class="bg-[#2E4077] p-6 text-center text-white relative">
            <h1 class="text-xl font-black flex items-center justify-center gap-2">
                <span id="headIcon">🛡️</span> <span id="headTitle">C조 통합 근무 시스템</span>
            </h1>
            <p id="current-time" class="text-[10px] opacity-70 mt-1.5 font-medium"></p>
            <button onclick="openAuth()" class="absolute right-4 top-7 text-xs bg-white/20 px-2 py-1 rounded font-bold">⚙️</button>
        </div>

        <div class="flex border-b bg-slate-50 sticky top-0 z-50">
            <button onclick="openTab('status')" id="btn-status" class="nav-tab active flex-1 py-4 text-[11px] font-black text-slate-400">🕒 실시간현황</button>
            <button onclick="openTab('schedule')" id="btn-schedule" class="nav-tab flex-1 py-4 text-[11px] font-black text-slate-400">📅 근무편성표</button>
            <button onclick="openTab('calendar')" id="btn-calendar" class="nav-tab flex-1 py-4 text-[11px] font-black text-slate-400">🏥 근무달력</button>
        </div>

        <div id="status" class="tab-content active p-3">
            <div id="worker-cards" class="status-card-grid"></div>
            <div id="time-msg"></div>
            <div id="next-duty-notice" class="text-center mb-4 text-[11px] font-black text-slate-500 bg-slate-100 py-3 rounded-xl border border-slate-200"></div>
            <div class="flex justify-between items-center mb-2 px-1">
                <span class="text-[11px] font-black text-slate-400">🕒 상세 근무 시간표</span>
                <button onclick="toggleFullTable()" id="toggle-full-table" class="text-[9px] bg-slate-200 px-2 py-1 rounded-full font-bold text-slate-600">전체보기 OFF</button>
            </div>
            <div class="overflow-hidden rounded-xl border border-slate-200 shadow-sm">
                <table class="custom-table" id="status-table"></table>
            </div>
        </div>

        <div id="schedule" class="tab-content p-3">
            <div class="bg-slate-50 p-4 rounded-xl mb-4 border border-slate-200 text-center">
                <div class="flex justify-between items-center mb-2 font-black text-[10px] text-slate-400 px-1">
                    <span>-12개월</span><span id="slider-label" class="text-[#2E4077]">조회 범위: +1개월</span><span>+12개월</span>
                </div>
                <input type="range" id="month-slider" min="-12" max="12" value="1" oninput="renderSchedule()" class="w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer mb-5">
                <select id="worker-focus" onchange="renderSchedule()" class="w-full p-3.5 border rounded-xl text-xs font-bold bg-white outline-none">
                    <option value="none">✨ 근무자 강조 선택</option>
                    <option value="황재업">황재업</option><option value="김태언">김태언</option><option value="이태원">이태원</option><option value="이정석">이정석</option>
                </select>
            </div>
            <div class="overflow-hidden rounded-xl border border-slate-200 shadow-sm">
                <table class="custom-table" id="schedule-list"></table>
            </div>
        </div>

        <div id="calendar" class="tab-content p-3">
            <div class="flex flex-col gap-3 mb-4">
                <div class="flex items-center justify-between bg-[#f8fafc] p-3 rounded-xl border border-slate-200">
                    <span class="text-xs font-black text-slate-500">강조 조:</span>
                    <select id="shiftSelect" onchange="renderCalendar()" class="text-xs p-2 bg-white border rounded-lg font-black w-36 outline-none text-[#2E4077]"></select>
                </div>
                <div id="singleNav" class="flex items-center justify-between bg-white p-2 rounded-xl border border-gray-200 shadow-sm">
                    <div class="flex gap-1">
                        <button onclick="changeYear(-1)" class="w-10 h-10 flex items-center justify-center bg-slate-50 rounded-lg font-bold">≪</button>
                        <button onclick="changeMonth(-1)" class="w-10 h-10 flex items-center justify-center bg-slate-50 rounded-lg font-bold">＜</button>
                    </div>
                    <h2 id="cal-title" class="text-sm font-black text-[#2E4077]"></h2>
                    <div class="flex gap-1">
                        <button onclick="changeMonth(1)" class="w-10 h-10 flex items-center justify-center bg-slate-50 rounded-lg font-bold">＞</button>
                        <button onclick="changeYear(1)" class="w-10 h-10 flex items-center justify-center bg-slate-50 rounded-lg font-bold">≫</button>
                    </div>
                </div>
            </div>
            <div id="calendar-area">
                <div id="single-view" class="bg-white rounded-xl shadow-sm overflow-hidden border border-gray-200">
                    <div class="grid grid-cols-7 text-center font-black text-[10px] py-3 bg-slate-50/80 text-slate-400 border-b">
                        <div class="sunday">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div class="saturday">토</div>
                    </div>
                    <div id="calendar-grid-body" class="calendar-grid"></div>
                </div>
                <div id="multi-view" class="hidden grid grid-cols-1 gap-6"></div>
            </div>
            <div class="flex justify-center mt-6 mb-10">
                <button onclick="toggleViewMode()" id="toggleModeBtn" class="bg-[#2E4077] text-white px-8 py-4 rounded-full font-black text-sm shadow-xl active:scale-95 transition-all">📅 6개월 모아보기 (3X2)</button>
            </div>
        </div>
    </div>

    <div id="authModal" class="modal-overlay">
        <div class="bg-white p-6 rounded-3xl w-full max-w-xs text-center shadow-2xl">
            <h3 class="text-lg font-black mb-4">관리자 인증</h3>
            <input type="password" id="authPw" class="admin-input text-center tracking-widest" placeholder="••••">
            <div class="flex gap-2">
                <button onclick="closeModal('authModal')" class="flex-1 py-3 bg-slate-100 rounded-xl font-bold">취소</button>
                <button onclick="checkAuth()" class="flex-1 py-3 bg-[#2E4077] text-white rounded-xl font-bold">확인</button>
            </div>
        </div>
    </div>

    <div id="adminModal" class="modal-overlay">
        <div class="bg-white p-6 rounded-3xl w-full max-w-sm max-h-[85vh] overflow-y-auto shadow-2xl">
            <h3 class="text-lg font-black mb-4 text-center">시스템 환경 설정</h3>
            <div class="space-y-4">
                <div><label class="text-[10px] font-bold text-slate-400 ml-1">앱 타이틀</label>
                <input type="text" id="appTitleIn" class="admin-input" placeholder="앱 이름"></div>
                <div><label class="text-[10px] font-bold text-slate-400 ml-1">패턴 기준 날짜 (C조 첫 근무일)</label>
                <input type="date" id="baseDateIn" class="admin-input"></div>
                <div id="pattern-settings" class="space-y-2 pt-2 border-t">
                    <label class="text-[10px] font-bold text-slate-400 ml-1">조별 색상 설정 (배경/강조)</label>
                </div>
            </div>
            <div class="flex gap-2 mt-6">
                <button onclick="closeModal('adminModal')" class="flex-1 py-3 bg-slate-100 rounded-xl font-bold">닫기</button>
                <button onclick="saveAdminSettings()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold">설정 저장</button>
            </div>
        </div>
    </div>

    <script>
        const DEFAULT_CONFIG = {
            appTitle: 'C조 통합 근무 시스템', appIcon: '🛡️', baseDate: '2026-03-09', adminPassword: '7979',
            patterns: [
                { name: 'C', color: '#E3F2FD', highlight: '#1976D2' },
                { name: 'A', color: '#FFF3E0', highlight: '#F57C00' },
                { name: 'B', color: '#FFEBEE', highlight: '#D32F2F' }
            ]
        };
        let config = JSON.parse(localStorage.getItem('shift_v5_config')) || DEFAULT_CONFIG;
        let isFullTable = false, viewMode = 'single', curY = new Date().getFullYear(), curM = new Date().getMonth();
        const WORKER_COLS = {"황재업":"#D9EAD3","김태언":"#FFF2CC","이태원":"#EAD1DC","이정석":"#C9DAF8"};
        const DATA_LIST = [["07:00", "08:00", "보안실", "로비", "로비", "휴게"], ["08:00", "09:00", "보안실", "휴게", "휴게", "로비"], ["09:00", "10:00", "보안실", "순찰", "휴게", "로비"], ["10:00", "11:00", "휴게", "보안실", "로비", "휴게"], ["11:00", "12:00", "보안실", "중식", "로비", "중식"], ["12:00", "13:00", "중식", "보안실", "중식", "로비"], ["13:00", "14:00", "보안실", "휴게", "순찰", "로비"], ["14:00", "15:00", "순찰", "보안실", "로비", "휴게"], ["15:00", "16:00", "보안실", "휴게", "로비", "휴게"], ["16:00", "17:00", "휴게", "보안실", "휴게", "로비"], ["17:00", "18:00", "보안실", "휴게", "휴게", "로비"], ["18:00", "19:00", "보안실", "석식", "로비", "석식"], ["19:00", "20:00", "보안실", "보안실", "석식", "로비"], ["20:00", "21:00", "석식", "보안실", "로비", "휴게"], ["21:00", "22:00", "보안실", "순찰", "로비", "휴게"], ["22:00", "23:00", "순찰", "보안실", "순찰", "로비"], ["23:00", "00:00", "보안실", "휴게", "휴게", "로비"], ["00:00", "01:00", "보안실", "휴게", "휴게", "로비"], ["01:00", "01:40", "보안실", "휴게", "휴게", "로비"], ["01:40", "02:00", "보안실", "보안실", "로비", "로비"], ["02:00", "03:00", "휴게", "보안실", "로비", "휴게"], ["03:00", "04:00", "휴게", "보안실", "로비", "휴게"], ["04:00", "05:00", "휴게", "보안실", "로비", "휴게"], ["05:00", "06:00", "보안실", "순찰", "로비", "순찰"], ["06:00", "07:00", "보안실", "정리", "로비", "정리"]];

        // 날짜 계산 로직: 새벽 07시 이전이면 '전날'로 간주
        function getLogicDate(dObj) {
            const d = new Date(dObj);
            if (d.getHours() < 7) d.setDate(d.getDate() - 1);
            d.setHours(0,0,0,0); return d;
        }

        function getShift(targetDate) {
            const d = new Date(targetDate); d.setHours(0,0,0,0);
            const base = new Date(config.baseDate); base.setHours(0,0,0,0);
            const diff = Math.floor((d - base) / 86400000);
            return config.patterns[((diff % 3) + 3) % 3];
        }

        function getWorkers(d) {
            const lDate = getLogicDate(d);
            if (getShift(lDate).name !== 'C') return null;
            const base = new Date(config.baseDate);
            const diffDays = Math.round((lDate - base) / 86400000);
            const ps = [["황재업", "김태언", "이태원", "이정석"], ["황재업", "김태언", "이정석", "이태원"], ["황재업", "이정석", "김태언", "이태원"], ["황재업", "이정석", "이태원", "김태언"], ["황재업", "이태원", "김태언", "이정석"], ["황재업", "이태원", "이정석", "김태언"]];
            return ps[((Math.floor(diffDays / 3) % 6) + 6) % 6];
        }

        function getNextDutyDate() {
            let now = new Date();
            // 새벽 7시 이전이면 현재 진행 중인 근무가 있으므로, '내일'부터 다음 근무를 찾음
            // 그 외의 시간에는 '오늘'을 포함하여 다음 근무를 찾음
            let startOffset = (now.getHours() < 7) ? 1 : 0;
            
            for(let i = startOffset; i < 15; i++) {
                let check = new Date(); check.setDate(now.getDate() + i);
                let logicD = getLogicDate(check);
                if(getShift(logicD).name === 'C') {
                    // 현재가 C조 근무 중인 날짜라면 그 다음 날짜를 반환
                    if(getShift(getLogicDate(now)).name === 'C' && logicD.getTime() === getLogicDate(now).getTime()) continue;
                    return check;
                }
            }
            return null;
        }

        function renderStatus() {
            const now = new Date(), lDate = getLogicDate(now), shift = getShift(lDate), isC = shift.name === 'C';
            const hr = now.getHours(), min = now.getMinutes();
            
            let totalMin = hr * 60 + min;
            if (hr < 7) totalMin += 1440; // 00~07시를 전날의 연장으로 계산

            let msg = "", isBig = false;
            if (isC) {
                if (hr === 6 && min >= 20 && min < 40) msg = "수고하셨습니다. 잘 마무리 하시고<br>다음 조와 근무 교대를 준비하십시오.";
                else if (hr === 6 && min >= 40) msg = "고생하셨습니다.<br>근무교대 시간입니다.";
                else msg = "🛡️ 현재 C조 근무 시간입니다.<br>오늘도 안전에 만전을 기해 주십시오!";
            } else {
                isBig = true;
                if (hr === 7 && min < 30) msg = "✨ 밤새 고생 많으셨습니다.<br>안전하게 퇴근하십시오!";
                else msg = "😴 오늘은 휴무일입니다.<br>편안한 휴식 되세요.";
            }
            document.getElementById('time-msg').innerHTML = `<div class="${isBig ? 'big-msg-box' : 'bg-blue-50 text-[#2E4077] p-4 rounded-2xl text-center font-bold text-[14px] border border-blue-100 shadow-sm mb-4'}">${msg}</div>`;

            const nextD = getNextDutyDate(), currentWs = getWorkers(now) || ["-","-","-","-"];
            const cardArea = document.getElementById('worker-cards');
            
            if (isC) {
                cardArea.classList.remove('hidden');
                let curIdx = -1;
                DATA_LIST.forEach((r, i) => {
                    let [sH, sM] = r[0].split(':').map(Number), [eH, eM] = r[1].split(':').map(Number);
                    let sT = sH * 60 + sM, eT = eH * 60 + eM;
                    if (sH < 7) sT += 1440;
                    if (eH < 7 || (eH === 7 && eM === 0)) eT += 1440;
                    if (totalMin >= sT && totalMin < eT) curIdx = i;
                });
                const curPos = (curIdx !== -1) ? DATA_LIST[curIdx] : ["-","-","휴게","휴게","휴게","휴게"];
                cardArea.innerHTML = currentWs.map((w, idx) => `<div class="worker-card" style="border-left: 4px solid ${WORKER_COLS[w] || '#ccc'}"><div class="worker-name">${['조장','성의','의산A','의산B'][idx]} ${w}</div><div class="worker-pos">${curPos[idx+2]}</div></div>`).join('');
            } else { cardArea.classList.add('hidden'); }

            document.getElementById('next-duty-notice').innerText = nextD ? `다음 근무는 ${nextD.getMonth()+1}월 ${nextD.getDate()}일 입니다.` : "";

            let h = `<thead><tr><th rowspan="2" class="time-cell">시간</th><th colspan="2">성의회관</th><th colspan="2">의생명산업연구원</th></tr><tr><th>${currentWs[0]}</th><th>${currentWs[1]}</th><th>${currentWs[2]}</th><th>${currentWs[3]}</th></tr></thead><tbody>`;
            let curViewIdx = -1;
            DATA_LIST.forEach((r, i) => {
                let [sH, sM] = r[0].split(':').map(Number), [eH, eM] = r[1].split(':').map(Number);
                let sT = sH * 60 + sM, eT = eH * 60 + eM;
                if (sH < 7) sT += 1440;
                if (eH < 7 || (eH === 7 && eM === 0)) eT += 1440;
                if (totalMin >= sT && totalMin < eT) curViewIdx = i;
            });
            DATA_LIST.forEach((r, i) => {
                if (isFullTable || i >= curViewIdx || !isC) {
                    const isNow = isC && i === curViewIdx;
                    h += `<tr ${isNow ? 'style="background-color:#fff7ed; outline:2px solid #ef4444; font-weight:bold;"' : ''}><td class="time-cell">${r[0]}~${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td><td>${r[4]}</td><td>${r[5]}</td></tr>`;
                }
            });
            document.getElementById('status-table').innerHTML = h + `</tbody>`;
            document.getElementById('current-time').innerText = now.toLocaleString();
        }

        function renderSchedule() {
            const val = parseInt(document.getElementById('month-slider').value), focus = document.getElementById('worker-focus').value;
            document.getElementById('slider-label').innerText = `조회 범위: ${val>=0?'+':''}${val}개월`;
            let h = `<thead><tr><th style="width:80px">날짜</th><th>조장</th><th>성희</th><th>의산A</th><th>의산B</th></tr></thead><tbody>`;
            for (let i = (val>=0?0:val*30); i < (val>=0?val*30+31:1); i++) {
                let d = new Date(); d.setDate(d.getDate() + i); const ws = getWorkers(d);
                if (ws) {
                    const di = d.getDay(), dc = di===0?'sunday':di===6?'saturday':'';
                    h += `<tr><td class="${dc} font-black bg-slate-50">${d.getMonth()+1}/${d.getDate()}(${['일','월','화','수','목','금','토'][di]})</td>`;
                    ws.forEach(w => h += `<td ${w===focus?`style="background-color:${WORKER_COLS[w]}; font-weight:900;"`:""}>${w}</td>`);
                    h += `</tr>`;
                }
            }
            document.getElementById('schedule-list').innerHTML = h + `</tbody>`;
        }

        function renderGrid(container, year, month) {
            container.innerHTML = ''; const target = document.getElementById('shiftSelect').value;
            const first = new Date(year, month, 1).getDay(), last = new Date(year, month+1, 0).getDate(), today = new Date().toDateString();
            for(let i=0; i<first; i++) container.innerHTML += `<div class="calendar-cell bg-slate-50/50"></div>`;
            for(let d=1; d<=last; d++) {
                const dt = new Date(year, month, d), shift = getShift(dt), isT = (target === shift.name);
                const cell = document.createElement('div'); cell.className = `calendar-cell ${dt.toDateString()===today?'is-today':''}`;
                cell.style.backgroundColor = isT ? shift.highlight : 'transparent';
                const dc = isT?'text-white':(dt.getDay()===0?'sunday':dt.getDay()===6?'saturday':'');
                cell.innerHTML = `<div class="date-area ${dc}">${d}</div><div class="shift-area" style="background:${isT?'transparent':shift.color}; color:${isT?'white':'#1e293b'}">${shift.name}</div>`;
                container.appendChild(cell);
            }
        }

        function renderCalendar() {
            if(viewMode === 'single') {
                document.getElementById('single-view').classList.remove('hidden'); document.getElementById('multi-view').classList.add('hidden'); document.getElementById('singleNav').classList.remove('hidden');
                document.getElementById('cal-title').innerText = `${curY}년 ${curM+1}월`; renderGrid(document.getElementById('calendar-grid-body'), curY, curM);
            } else {
                document.getElementById('single-view').classList.add('hidden'); document.getElementById('multi-view').classList.remove('hidden'); document.getElementById('singleNav').classList.add('hidden');
                const multi = document.getElementById('multi-view'); multi.innerHTML = '';
                for(let i=0; i<6; i++){
                    let d = new Date(curY, curM+i, 1);
                    let card = document.createElement('div'); card.className = "bg-white rounded-xl shadow border overflow-hidden";
                    card.innerHTML = `<div class="p-2.5 bg-[#2E4077] text-white text-center font-bold text-xs">${d.getFullYear()}년 ${d.getMonth()+1}월</div>`;
                    let g = document.createElement('div'); g.className = 'calendar-grid'; renderGrid(g, d.getFullYear(), d.getMonth());
                    card.appendChild(g); multi.appendChild(card);
                }
            }
        }

        function toggleViewMode() { viewMode = viewMode==='single'?'multi':'single'; document.getElementById('toggleModeBtn').innerText = viewMode==='single'?'📅 6개월 모아보기 (3X2)':'📱 상세 달력 보기'; renderCalendar(); }
        function openTab(id) { document.querySelectorAll('.tab-content, .nav-tab').forEach(el => el.classList.remove('active')); document.getElementById(id).classList.add('active'); document.getElementById('btn-'+id).classList.add('active'); if(id==='calendar') renderCalendar(); else if(id==='schedule') renderSchedule(); else renderStatus(); }
        function toggleFullTable() { isFullTable = !isFullTable; document.getElementById('toggle-full-table').innerText = isFullTable?"전체보기 ON":"전체보기 OFF"; renderStatus(); }
        function changeMonth(v) { curM+=v; if(curM<0){curM=11;curY--;} else if(curM>11){curM=0;curY++;} renderCalendar(); }
        function changeYear(v) { curY+=v; renderCalendar(); }

        function openAuth() { document.getElementById('authModal').classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function checkAuth() {
            if(document.getElementById('authPw').value === config.adminPassword) {
                closeModal('authModal'); initAdminUI(); document.getElementById('adminModal').classList.add('active');
            } else { alert('비밀번호가 틀렸습니다.'); }
            document.getElementById('authPw').value = "";
        }
        function initAdminUI() {
            document.getElementById('appTitleIn').value = config.appTitle;
            document.getElementById('baseDateIn').value = config.baseDate;
            const pArea = document.getElementById('pattern-settings');
            pArea.innerHTML = '<label class="text-[10px] font-bold text-slate-400 ml-1">조별 색상 설정 (배경/강조)</label>';
            config.patterns.forEach((p, i) => {
                pArea.innerHTML += `
                    <div class="flex items-center gap-2 bg-slate-50 p-2 rounded-lg border">
                        <span class="w-8 font-black text-xs text-slate-500">${p.name}조</span>
                        <input type="color" id="p-bg-${i}" value="${p.color}" class="w-10 h-6 border-0">
                        <input type="color" id="p-hi-${i}" value="${p.highlight}" class="w-10 h-6 border-0">
                    </div>`;
            });
        }
        function saveAdminSettings() {
            config.appTitle = document.getElementById('appTitleIn').value;
            config.baseDate = document.getElementById('baseDateIn').value;
            config.patterns.forEach((p, i) => {
                p.color = document.getElementById(`p-bg-${i}`).value;
                p.highlight = document.getElementById(`p-hi-${i}`).value;
            });
            localStorage.setItem('shift_v5_config', JSON.stringify(config));
            alert('설정이 저장되었습니다.');
            location.reload();
        }

        setInterval(renderStatus, 10000);
        window.onload = () => {
            document.getElementById('headTitle').innerText = config.appTitle;
            const sel = document.getElementById('shiftSelect'); sel.innerHTML = '<option value="none">강조 안 함</option>';
            config.patterns.forEach(p => sel.innerHTML += `<option value="${p.name}">${p.name}조 강조</option>`);
            renderStatus();
        };
    </script>
</body>
</html>

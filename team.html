<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>C조 통합 근무 시스템 v7.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; margin: 0; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-tab.active { color: #2E4077; border-bottom: 4px solid #2E4077; background-color: white; }
        .custom-table { width: 100%; border-collapse: collapse; font-size: 11px; text-align: center; table-layout: fixed; background: white; }
        .custom-table th { background: #f1f5f9; color: #1e293b; padding: 8px 1px; border: 1px solid #e2e8f0; font-weight: 800; }
        .custom-table td { border: 1px solid #e2e8f0; padding: 8px 1px; color: #475569; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); border-top: 1px solid #e2e8f0; border-left: 1px solid #e2e8f0; background: white; }
        .calendar-cell { border-right: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; display: flex; flex-direction: column; aspect-ratio: 1 / 1.3; padding: 2px; min-height: 65px; }
        .is-today { outline: 3px solid #ef4444; outline-offset: -3px; z-index: 10; background-color: #fff1f2; }
        .shift-badge { margin-top: auto; font-size: 10px; font-weight: 900; padding: 3px 0; border-radius: 4px; text-align: center; }
    </style>
</head>
<body>
    <div class="max-w-md mx-auto bg-white min-h-screen shadow-2xl flex flex-col">
        <div class="bg-[#2E4077] p-6 text-center text-white">
            <h1 class="text-xl font-black italic tracking-tighter">🛡️ C-JO INTEGRATED HUB</h1>
            <p id="current-time" class="text-[10px] opacity-70 mt-1.5 font-bold"></p>
        </div>

        <div class="flex border-b bg-slate-50 sticky top-0 z-50">
            <button onclick="openTab('status')" id="btn-status" class="nav-tab active flex-1 py-4 text-[13px] font-black transition-all">🕒 현황</button>
            <button onclick="openTab('schedule')" id="btn-schedule" class="nav-tab flex-1 py-4 text-[13px] font-black transition-all">📅 명단</button>
            <button onclick="openTab('calendar')" id="btn-calendar" class="nav-tab flex-1 py-4 text-[13px] font-black transition-all">🏥 달력</button>
        </div>

        <div id="status" class="tab-content active p-3">
            <div id="time-msg" class="mb-4"></div>
            <div id="worker-cards" class="grid grid-cols-2 gap-2 mb-4"></div>
            <div id="next-duty-notice" class="text-center mb-4 text-[11px] font-bold text-slate-500 bg-slate-50 py-3 rounded-xl border border-slate-200"></div>
            <div class="flex justify-between items-center mb-2">
                <span class="text-[12px] font-black text-slate-700 ml-1">📋 실시간 시간표</span>
                <button onclick="toggleFullTable()" id="toggle-btn" class="text-[10px] bg-slate-800 text-white px-3 py-1 rounded-full font-bold">전체보기 OFF</button>
            </div>
            <div class="overflow-hidden rounded-xl border border-slate-200">
                <table class="custom-table" id="status-table"></table>
            </div>
        </div>

        <div id="schedule" class="tab-content p-3">
            <div class="mb-3 grid grid-cols-2 gap-2 bg-slate-50 p-3 rounded-xl border">
                <div>
                    <label class="block text-[10px] font-black text-slate-400 mb-1">인물 강조</label>
                    <select id="worker-focus" onchange="renderSchedule()" class="w-full text-[12px] border rounded-lg p-2 font-bold bg-white">
                        <option value="">없음</option>
                        <option value="황재업">황재업</option><option value="김태언">김태언</option>
                        <option value="이태원">이태원</option><option value="이정석">이정석</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 mb-1">조회 범위</label>
                    <select id="schedule-range" onchange="renderSchedule()" class="w-full text-[12px] border rounded-lg p-2 font-bold bg-white">
                        <option value="30">30일</option><option value="60">60일</option><option value="90">90일</option>
                    </select>
                </div>
            </div>
            <div class="overflow-hidden rounded-xl border border-slate-200">
                <table class="custom-table" id="schedule-list"></table>
            </div>
        </div>

        <div id="calendar" class="tab-content p-3">
            <div class="flex justify-between items-center mb-4 px-2">
                <button onclick="changeMonth(-1)" class="w-10 h-10 flex items-center justify-center bg-slate-100 rounded-full font-black text-[#2E4077]">◀</button>
                <div id="cal-title" class="font-black text-[#2E4077] text-lg"></div>
                <button onclick="changeMonth(1)" class="w-10 h-10 flex items-center justify-center bg-slate-100 rounded-full font-black text-[#2E4077]">▶</button>
            </div>
            <div class="grid grid-cols-7 text-center font-black text-[11px] py-2 bg-slate-50 text-slate-400 border-b">
                <div class="text-red-500">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div class="text-blue-500">토</div>
            </div>
            <div id="calendar-grid-body" class="calendar-grid"></div>
        </div>
    </div>

    <script>
        const CONFIG = {
            baseDate: '2026-03-09',
            patterns: [
                {name:'C', color:'#E3F2FD', highlight:'#1976D2'}, 
                {name:'A', color:'#FFF3E0', highlight:'#F57C00'}, 
                {name:'B', color:'#FFEBEE', highlight:'#D32F2F'}
            ],
            workers: [
                ["황재업", "김태언", "이태원", "이정석"], ["황재업", "김태언", "이정석", "이태원"],
                ["황재업", "이정석", "김태언", "이태원"], ["황재업", "이정석", "이태원", "김태언"],
                ["황재업", "이태원", "김태언", "이정석"], ["황재업", "이태원", "이정석", "김태언"]
            ]
        };

        const DATA_LIST = [["07:00", "08:00", "보안실", "로비", "로비", "휴게"], ["08:00", "09:00", "보안실", "휴게", "휴게", "로비"], ["09:00", "10:00", "보안실", "순찰", "휴게", "로비"], ["10:00", "11:00", "휴게", "보안실", "로비", "휴게"], ["11:00", "12:00", "보안실", "중식", "로비", "중식"], ["12:00", "13:00", "중식", "보안실", "중식", "로비"], ["13:00", "14:00", "보안실", "휴게", "순찰", "로비"], ["14:00", "15:00", "순찰", "보안실", "로비", "휴게"], ["15:00", "16:00", "보안실", "휴게", "로비", "휴게"], ["16:00", "17:00", "휴게", "보안실", "휴게", "로비"], ["17:00", "18:00", "보안실", "휴게", "휴게", "로비"], ["18:00", "19:00", "보안실", "석식", "로비", "석식"], ["19:00", "20:00", "보안실", "보안실", "석식", "로비"], ["20:00", "21:00", "석식", "보안실", "로비", "휴게"], ["21:00", "22:00", "보안실", "순찰", "로비", "휴게"], ["22:00", "23:00", "순찰", "보안실", "순찰", "로비"], ["23:00", "00:00", "보안실", "휴게", "휴게", "로비"], ["00:00", "01:00", "보안실", "휴게", "휴게", "로비"], ["01:00", "01:40", "보안실", "휴게", "휴게", "로비"], ["01:40", "02:00", "보안실", "보안실", "로비", "로비"], ["02:00", "03:00", "휴게", "보안실", "로비", "휴게"], ["03:00", "04:00", "휴게", "보안실", "로비", "휴게"], ["04:00", "05:00", "휴게", "보안실", "로비", "휴게"], ["05:00", "06:00", "보안실", "순찰", "로비", "순찰"], ["06:00", "07:00", "보안실", "정리", "로비", "정리"]];

        let curY = new Date().getFullYear(), curM = new Date().getMonth();
        let isFullTable = false;

        // [최우선 로직] 사용자님의 07시 기준 날짜 계산 로직 (가장 안정적)
        function getDutyInfo(date) {
            let d = new Date(date);
            if (date.getHours() < 7) d.setDate(d.getDate() - 1);
            d.setHours(0,0,0,0);
            const base = new Date(CONFIG.baseDate);
            base.setHours(0,0,0,0);
            const diff = Math.round((d - base) / 86400000);
            const dayIdx = ((diff % 3) + 3) % 3;
            let pIdx = -1;
            if (dayIdx === 0) {
                const dutyCount = Math.floor(diff / 3);
                pIdx = ((dutyCount % 6) + 6) % 6;
            }
            return { logicalDate: d, dayIdx, pIdx, isDuty: (dayIdx === 0) };
        }

        // [현황 렌더링]
        function renderStatus() {
            const now = new Date();
            const info = getDutyInfo(now);
            const hr = now.getHours(), min = now.getMinutes();
            let checkMin = hr * 60 + min;
            if (checkMin < 420) checkMin += 1440;

            const msgBox = document.getElementById('time-msg');
            const cardArea = document.getElementById('worker-cards');
            const table = document.getElementById('status-table');
            
            if (info.isDuty) {
                msgBox.innerHTML = `<div style="background:${CONFIG.patterns[0].highlight}" class="text-white p-5 rounded-2xl text-center font-black text-lg shadow-md border-b-4 border-black/20">🛡️ C조 당직 근무 중</div>`;
                
                let curIdx = DATA_LIST.findIndex(r => {
                    let [sH, sM] = r[0].split(':').map(Number);
                    let sT = (sH < 7 ? sH * 60 + sM + 1440 : sH * 60 + sM);
                    return checkMin >= sT && checkMin < sT + 60;
                });

                const ws = CONFIG.workers[info.pIdx];
                const pos = (curIdx !== -1) ? DATA_LIST[curIdx] : ["-","-","휴게","휴게","휴게","휴게"];
                cardArea.innerHTML = ws.map((w, i) => `
                    <div class="bg-white p-3 rounded-xl border border-slate-200 text-center shadow-sm" style="border-top:4px solid ${CONFIG.patterns[0].highlight}">
                        <div class="text-[10px] font-black text-slate-400">${['조장','성희','의산A','의산B'][i]}</div>
                        <div class="text-[15px] font-black text-slate-800">${w}</div>
                        <div class="text-[13px] font-bold text-blue-600 mt-1">${pos[i+2]}</div>
                    </div>`).join('');
                
                let h = `<thead><tr><th rowspan="2" class="w-16">시간</th><th colspan="2">성의회관</th><th colspan="2">의산원</th></tr><tr><th>${ws[0]}</th><th>${ws[1]}</th><th>${ws[2]}</th><th>${ws[3]}</th></tr></thead><tbody>`;
                DATA_LIST.forEach((r, i) => {
                    let [sH, sM] = r[0].split(':').map(Number);
                    let sT = (sH < 7 ? sH * 60 + sM + 1440 : sH * 60 + sM);
                    const isNow = (checkMin >= sT && checkMin < sT + 60);
                    if (isFullTable || isNow || sT > checkMin) {
                        h += `<tr ${isNow ? 'class="bg-orange-50 font-black outline outline-2 outline-red-500 z-10 relative"' : ''}>
                            <td class="bg-slate-50 font-bold">${r[0]}~${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td><td>${r[4]}</td><td>${r[5]}</td></tr>`;
                    }
                });
                table.innerHTML = h + "</tbody>";
            } else {
                msgBox.innerHTML = `<div class="bg-slate-200 text-slate-500 p-5 rounded-2xl text-center font-black text-lg border">😴 오늘은 비번(휴무)입니다.</div>`;
                cardArea.innerHTML = "";
            }
            document.getElementById('current-time').innerText = now.toLocaleString();
        }

        // [명단 렌더링 - 하이라이트/조회기간 완전수정]
        function renderSchedule() {
            const focus = document.getElementById('worker-focus').value;
            const range = parseInt(document.getElementById('schedule-range').value);
            let h = `<thead><tr><th>날짜</th><th>조장</th><th>성희</th><th>의산A</th><th>의산B</th></tr></thead><tbody>`;
            let d = new Date(); d.setHours(12,0,0,0);
            for (let i = -1; i < range; i++) {
                let t = new Date(d); t.setDate(t.getDate() + i);
                const info = getDutyInfo(t);
                if (info.isDuty) {
                    const ws = CONFIG.workers[info.pIdx];
                    h += `<tr><td class="${t.getDay()===0?'text-red-500':''} font-bold bg-slate-50">${t.getMonth()+1}/${t.getDate()}(${['일','월','화','수','목','금','토'][t.getDay()]})</td>`;
                    ws.forEach(w => {
                        const style = (w === focus) ? `style="background:${CONFIG.patterns[0].color}; font-weight:900; color:${CONFIG.patterns[0].highlight}"` : "";
                        h += `<td ${style}>${w}</td>`;
                    });
                    h += `</tr>`;
                }
            }
            document.getElementById('schedule-list').innerHTML = h + `</tbody>`;
        }

        // [달력 렌더링 - 이동/색상 완전복구]
        function renderCalendar() {
            const body = document.getElementById('calendar-grid-body');
            body.innerHTML = '';
            document.getElementById('cal-title').innerText = `${curY}년 ${curM+1}월`;
            const first = new Date(curY, curM, 1).getDay();
            const last = new Date(curY, curM + 1, 0).getDate();
            const todayStr = new Date().toDateString();

            for(let i=0; i<first; i++) body.innerHTML += `<div class="calendar-cell bg-slate-50/50"></div>`;
            for(let d=1; d<=last; d++) {
                const dt = new Date(curY, curM, d, 12, 0, 0);
                const info = getDutyInfo(dt);
                const shift = CONFIG.patterns[info.dayIdx];
                const isToday = todayStr === new Date(curY, curM, d).toDateString();
                
                body.innerHTML += `
                    <div class="calendar-cell ${isToday ? 'is-today' : ''}">
                        <div class="text-[10px] font-bold ${dt.getDay()===0?'text-red-500':(dt.getDay()===6?'text-blue-500':'')}">${d}</div>
                        <div class="shift-badge" style="background:${info.isDuty?shift.highlight:shift.color}; color:${info.isDuty?'white':'#64748b'}">
                            ${shift.name}
                        </div>
                    </div>`;
            }
        }

        // [유틸리티]
        function openTab(id) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('btn-'+id).classList.add('active');
            if(id==='calendar') renderCalendar(); else if(id==='schedule') renderSchedule(); else renderStatus();
        }

        function changeMonth(v) { 
            curM += v; if(curM < 0){ curM=11; curY--; } else if(curM > 11){ curM=0; curY++; } 
            renderCalendar(); 
        }

        function toggleFullTable() {
            isFullTable = !isFullTable;
            document.getElementById('toggle-btn').innerText = isFullTable ? "전체보기 ON" : "전체보기 OFF";
            renderStatus();
        }

        window.onload = () => { renderStatus(); };
        setInterval(renderStatus, 10000);
    </script>
</body>
</html>
